<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dear Ethicist — Advice Study</title>
<style>
  :root { --ink:#1e293b; --paper:#fdfaf3; --accent:#7c3aed; --line:#e5e0d5; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--paper); color:var(--ink);
         font-family: Georgia, 'Times New Roman', serif; line-height:1.55; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 1.6rem; letter-spacing:.5px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px;
          padding:26px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
  .subject { font-variant: small-caps; letter-spacing:.6px; color:var(--accent);
             font-weight:bold; margin-bottom:6px; }
  .body { font-size:1.12rem; margin: 10px 0 22px; }
  .opts { display:flex; flex-direction:column; gap:12px; }
  button.opt { font-family:inherit; font-size:1.05rem; text-align:left; cursor:pointer;
       padding:14px 18px; border:1px solid var(--line); border-radius:10px; background:#faf7ef; }
  button.opt:hover { border-color:var(--accent); background:#f3edff; }
  button.go { font-family:inherit; font-size:1rem; cursor:pointer; padding:12px 22px;
       border:none; border-radius:10px; background:var(--accent); color:#fff; }
  .muted { color:#64748b; font-size:.92rem; }
  .prog { height:6px; background:var(--line); border-radius:4px; margin:0 0 22px; overflow:hidden; }
  .prog > div { height:100%; background:var(--accent); width:0; transition:width .3s; }
  label { display:block; margin:10px 0 4px; font-size:.95rem; }
  select, input { font-family:inherit; font-size:1rem; padding:8px; width:100%;
       border:1px solid var(--line); border-radius:8px; background:#fff; }
  textarea { width:100%; height:120px; font-family:monospace; font-size:.8rem; }
  .row { display:flex; gap:14px; } .row > div { flex:1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Dear Ethicist</h1>
  <p class="muted">An advice-column study. You'll read short letters and pick the advice you'd give.
     About 8 minutes.</p>
  <div class="prog"><div id="bar"></div></div>
  <div id="stage" class="card"></div>
</div>
<script src="pilot.js"></script>
</body>
</html>
