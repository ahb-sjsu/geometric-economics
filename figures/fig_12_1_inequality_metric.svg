<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 15px; font-weight: 600; fill: #333; }
      .subtitle { font-size: 10px; fill: #666; }
      .label { font-size: 11px; fill: #444; font-weight: 500; }
      .small { font-size: 9px; fill: #555; }
      .agent { font-size: 12px; font-weight: 700; }
      .value { font-size: 11px; font-weight: 600; }
      .metric-val { font-size: 16px; font-weight: 700; }
    </style>
    <linearGradient id="poor-curve" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdd2;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ef9a9a;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="rich-curve" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <text x="400" y="26" text-anchor="middle" class="title">Figure 12.1 -- Inequality as Metric Distortion: Same $100, Different Geometric Cost</text>
  <text x="400" y="44" text-anchor="middle" class="subtitle">Different agents experience different metrics on the same manifold. A dollar is not a dollar -- its geometric cost depends on position.</text>

  <!-- Top: manifold visualization -->
  <g transform="translate(40, 60)">
    <!-- Shared manifold surface -->
    <rect x="0" y="0" width="720" height="170" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" rx="10"/>
    <text x="360" y="18" text-anchor="middle" class="small" fill="#999" font-weight="600">THE SAME ECONOMIC MANIFOLD</text>

    <!-- Curved grid to suggest manifold -->
    <path d="M 20,80 Q 180,60 360,80 Q 540,100 700,80" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 20,100 Q 180,80 360,100 Q 540,120 700,100" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 20,120 Q 180,100 360,120 Q 540,140 700,120" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>

    <!-- Cross lines -->
    <path d="M 100,55 Q 100,100 100,145" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 200,50 Q 200,95 200,140" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 300,55 Q 300,100 300,145" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 400,60 Q 400,105 400,150" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 500,55 Q 500,100 500,145" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>
    <path d="M 600,50 Q 600,95 600,140" fill="none" stroke="#e8e8e8" stroke-width="0.8"/>

    <!-- Tomas: high curvature region (tight grid, small steps = big cost) -->
    <g transform="translate(120, 75)">
      <!-- High-curvature visual: concentric tight circles -->
      <circle cx="0" cy="0" r="8" fill="#c62828" stroke="#fff" stroke-width="2"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#ef9a9a" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="#ef9a9a" stroke-width="0.8" stroke-dasharray="3,2"/>
      <circle cx="0" cy="0" r="44" fill="none" stroke="#ef9a9a" stroke-width="0.5" stroke-dasharray="2,3"/>
      <text x="0" y="-52" text-anchor="middle" class="agent" fill="#c62828">Tomas</text>
      <text x="0" y="62" text-anchor="middle" class="small" fill="#c62828" font-weight="600">HIGH CURVATURE</text>
      <text x="0" y="74" text-anchor="middle" class="small" fill="#c62828">$100 = large displacement</text>
    </g>

    <!-- Maria: moderate curvature -->
    <g transform="translate(360, 80)">
      <circle cx="0" cy="0" r="7" fill="#f57f17" stroke="#fff" stroke-width="2"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#ffb74d" stroke-width="1"/>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#ffb74d" stroke-width="0.6" stroke-dasharray="3,2"/>
      <text x="0" y="-52" text-anchor="middle" class="agent" fill="#f57f17">Maria</text>
      <text x="0" y="62" text-anchor="middle" class="small" fill="#f57f17" font-weight="600">MODERATE CURVATURE</text>
      <text x="0" y="74" text-anchor="middle" class="small" fill="#f57f17">$100 = felt but manageable</text>
    </g>

    <!-- Richard: flat region (wide grid, same step = tiny cost) -->
    <g transform="translate(600, 85)">
      <circle cx="0" cy="0" r="6" fill="#2e7d32" stroke="#fff" stroke-width="2"/>
      <circle cx="0" cy="0" r="40" fill="none" stroke="#a5d6a7" stroke-width="0.7" stroke-dasharray="4,3"/>
      <text x="0" y="-48" text-anchor="middle" class="agent" fill="#2e7d32">Richard</text>
      <text x="0" y="55" text-anchor="middle" class="small" fill="#2e7d32" font-weight="600">FLAT (near-zero curvature)</text>
      <text x="0" y="67" text-anchor="middle" class="small" fill="#2e7d32">$100 = imperceptible</text>
    </g>
  </g>

  <!-- Bottom: three agent detail cards -->
  <!-- Tomas -->
  <g transform="translate(20, 252)">
    <rect x="0" y="0" width="248" height="205" fill="#fff5f5" stroke="#ef9a9a" stroke-width="1.5" rx="8"/>
    <text x="124" y="20" text-anchor="middle" class="agent" fill="#c62828">Tomas (min-wage)</text>
    <text x="124" y="36" text-anchor="middle" class="small" fill="#c62828">Income: $32,000/yr | sigma_1 = $50</text>

    <text x="12" y="55" class="small" fill="#555" font-weight="600">$100 impact across dimensions:</text>

    <!-- Impact bars -->
    <rect x="12" y="62" width="220" height="16" fill="#ef5350" rx="2"/>
    <text x="122" y="74" text-anchor="middle" class="small" fill="#fff" font-weight="600">d1: 0.31% of income -- SIGNIFICANT</text>

    <rect x="12" y="82" width="180" height="16" fill="#e57373" rx="2"/>
    <text x="102" y="94" text-anchor="middle" class="small" fill="#fff" font-weight="600">d3: may skip meals (fairness)</text>

    <rect x="12" y="102" width="150" height="16" fill="#ef9a9a" rx="2"/>
    <text x="87" y="114" text-anchor="middle" class="small" fill="#c62828" font-weight="600">d4: less freedom this week</text>

    <rect x="12" y="122" width="130" height="16" fill="#ffcdd2" rx="2"/>
    <text x="77" y="134" text-anchor="middle" class="small" fill="#c62828">d9: anxiety about rent</text>

    <rect x="12" y="148" width="224" height="44" fill="#ffebee" stroke="#ef9a9a" stroke-width="0.5" rx="4"/>
    <text x="124" y="165" text-anchor="middle" class="metric-val" fill="#c62828">Cost = 4.7</text>
    <text x="124" y="182" text-anchor="middle" class="small" fill="#c62828">g_11 = 1/50^2 = 4 x 10^-4</text>
  </g>

  <!-- Maria -->
  <g transform="translate(278, 252)">
    <rect x="0" y="0" width="248" height="205" fill="#fffde7" stroke="#ffd54f" stroke-width="1.5" rx="8"/>
    <text x="124" y="20" text-anchor="middle" class="agent" fill="#f57f17">Maria (shop owner)</text>
    <text x="124" y="36" text-anchor="middle" class="small" fill="#f57f17">Income: $65,000/yr | sigma_1 = $200</text>

    <text x="12" y="55" class="small" fill="#555" font-weight="600">$100 impact across dimensions:</text>

    <rect x="12" y="62" width="140" height="16" fill="#ffb74d" rx="2"/>
    <text x="82" y="74" text-anchor="middle" class="small" fill="#fff" font-weight="600">d1: 0.15% -- noticeable</text>

    <rect x="12" y="82" width="70" height="16" fill="#ffe0b2" rx="2"/>
    <text x="47" y="94" text-anchor="middle" class="small" fill="#e65100">d3: minor</text>

    <rect x="12" y="102" width="50" height="16" fill="#fff3e0" rx="2"/>
    <text x="37" y="114" text-anchor="middle" class="small" fill="#e65100">d4:</text>
    <text x="70" y="114" class="small" fill="#e65100">slight</text>

    <rect x="12" y="148" width="224" height="44" fill="#fffde7" stroke="#ffd54f" stroke-width="0.5" rx="4"/>
    <text x="124" y="165" text-anchor="middle" class="metric-val" fill="#f57f17">Cost = 1.8</text>
    <text x="124" y="182" text-anchor="middle" class="small" fill="#f57f17">g_11 = 1/200^2 = 2.5 x 10^-5</text>
  </g>

  <!-- Richard -->
  <g transform="translate(536, 252)">
    <rect x="0" y="0" width="248" height="205" fill="#f1f8e9" stroke="#a5d6a7" stroke-width="1.5" rx="8"/>
    <text x="124" y="20" text-anchor="middle" class="agent" fill="#2e7d32">Richard (REIT CEO)</text>
    <text x="124" y="36" text-anchor="middle" class="small" fill="#2e7d32">Income: $2.4M/yr | sigma_1 = $5,000</text>

    <text x="12" y="55" class="small" fill="#555" font-weight="600">$100 impact across dimensions:</text>

    <rect x="12" y="62" width="22" height="16" fill="#a5d6a7" rx="2"/>
    <text x="42" y="74" class="small" fill="#2e7d32">d1: 0.004% -- imperceptible</text>

    <text x="22" y="98" class="small" fill="#999">All other dimensions: effectively 0</text>
    <text x="22" y="114" class="small" fill="#999">$100 is below perceptual threshold</text>

    <rect x="12" y="148" width="224" height="44" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="0.5" rx="4"/>
    <text x="124" y="165" text-anchor="middle" class="metric-val" fill="#2e7d32">Cost = 0.04</text>
    <text x="124" y="182" text-anchor="middle" class="small" fill="#2e7d32">g_11 = 1/5000^2 = 4 x 10^-8</text>
  </g>

  <!-- Bottom summary -->
  <rect x="50" y="465" width="700" height="28" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1" rx="5"/>
  <text x="400" y="478" text-anchor="middle" class="small" fill="#333" font-weight="600">Same $100. Geometric costs: 4.7 vs 1.8 vs 0.04. Ratio: 4.7/0.04 = 118x. The Gini coefficient (a scalar) cannot capture this metric distortion.</text>
  <text x="400" y="492" text-anchor="middle" class="subtitle">Inequality is not an uneven distribution of a number -- it is a position-dependent metric on the manifold.</text>
</svg>