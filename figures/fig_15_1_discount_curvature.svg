<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 14px; font-weight: 600; fill: #333; }
      .subtitle { font-size: 10px; fill: #666; }
      .axis-label { font-size: 11px; fill: #444; font-weight: 500; }
      .tick { font-size: 9px; fill: #999; }
      .curve-label { font-size: 10px; font-weight: 600; }
      .small { font-size: 9px; fill: #555; }
    </style>
  </defs>

  <text x="340" y="24" text-anchor="middle" class="title">Figure 15.1 — The Discount Rate as Temporal Curvature</text>
  <text x="340" y="40" text-anchor="middle" class="subtitle">Exponential discounting assumes constant curvature. Observed discounting is hyperbolic — curvature decreases with temporal distance.</text>

  <g transform="translate(80, 65)">
    <!-- Axes -->
    <line x1="0" y1="260" x2="520" y2="260" stroke="#333" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="260" stroke="#333" stroke-width="1.2"/>

    <text x="260" y="295" text-anchor="middle" class="axis-label">Time horizon (years)</text>
    <text x="-50" y="130" text-anchor="middle" transform="rotate(-90,-50,130)" class="axis-label">Present value of $1 future</text>

    <!-- Y ticks -->
    <text x="-8" y="264" text-anchor="end" class="tick">$0.00</text>
    <text x="-8" y="199" text-anchor="end" class="tick">$0.25</text>
    <text x="-8" y="134" text-anchor="end" class="tick">$0.50</text>
    <text x="-8" y="69" text-anchor="end" class="tick">$0.75</text>
    <text x="-8" y="4" text-anchor="end" class="tick">$1.00</text>

    <!-- X ticks -->
    <text x="0" y="278" text-anchor="middle" class="tick">0</text>
    <text x="104" y="278" text-anchor="middle" class="tick">10</text>
    <text x="208" y="278" text-anchor="middle" class="tick">20</text>
    <text x="312" y="278" text-anchor="middle" class="tick">30</text>
    <text x="416" y="278" text-anchor="middle" class="tick">40</text>
    <text x="520" y="278" text-anchor="middle" class="tick">50</text>

    <!-- Grid -->
    <line x1="0" y1="195" x2="520" y2="195" stroke="#f0f0f0" stroke-width="0.5"/>
    <line x1="0" y1="130" x2="520" y2="130" stroke="#f0f0f0" stroke-width="0.5"/>
    <line x1="0" y1="65" x2="520" y2="65" stroke="#f0f0f0" stroke-width="0.5"/>

    <!-- Exponential discounting (δ=3%, Nordhaus): e^(-0.03t) -->
    <!-- t=0:1.0, t=10:0.74, t=20:0.55, t=30:0.41, t=40:0.30, t=50:0.22 -->
    <path d="M 0,0 C 30,30 60,78 104,68 C 148,92 180,120 208,117 C 250,140 280,153 312,154 C 350,168 380,176 416,182 C 460,190 490,196 520,203"
          fill="none" stroke="#2171b5" stroke-width="2.5"/>
    <text x="530" y="200" class="curve-label" fill="#2171b5">Exponential</text>
    <text x="530" y="213" class="small" fill="#2171b5">δ = 3% (Nordhaus)</text>
    <text x="530" y="226" class="small" fill="#2171b5">Constant curvature</text>

    <!-- Hyperbolic discounting: 1/(1+0.05t) -->
    <!-- t=0:1.0, t=10:0.67, t=20:0.50, t=30:0.40, t=40:0.33, t=50:0.29 -->
    <path d="M 0,0 C 20,45 50,72 104,86 C 150,110 180,125 208,130 C 250,142 280,150 312,156 C 350,164 380,170 416,175 C 460,180 490,183 520,186"
          fill="none" stroke="#d95f02" stroke-width="2.5" stroke-dasharray="8,3"/>
    <text x="530" y="183" class="curve-label" fill="#d95f02">Hyperbolic</text>
    <text x="530" y="196" class="small" fill="#d95f02">k = 0.05 (observed)</text>
    <text x="530" y="209" class="small" fill="#d95f02">Decreasing curvature</text>

    <!-- Stern (near-zero discounting) -->
    <!-- δ=0.1%: e^(-0.001t) — nearly flat -->
    <path d="M 0,0 C 60,2 120,5 208,5 C 300,8 400,10 520,13"
          fill="none" stroke="#1b9e77" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="530" y="10" class="curve-label" fill="#1b9e77">Stern</text>
    <text x="530" y="23" class="small" fill="#1b9e77">δ ≈ 0.1% (flat manifold)</text>

    <!-- Key region: short-term divergence -->
    <rect x="0" y="0" width="80" height="90" fill="rgba(255,152,0,0.08)" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="3,3" rx="4"/>
    <text x="40" y="105" text-anchor="middle" class="small" fill="#ff9800" font-weight="600">Steep curvature</text>
    <text x="40" y="117" text-anchor="middle" class="small" fill="#ff9800">near present</text>

    <!-- Long-term convergence region -->
    <rect x="350" y="150" width="170" height="50" fill="rgba(76,175,80,0.06)" stroke="#66bb6a" stroke-width="0.8" stroke-dasharray="3,3" rx="4"/>
    <text x="435" y="168" text-anchor="middle" class="small" fill="#2e7d32">Curves converge</text>
    <text x="435" y="180" text-anchor="middle" class="small" fill="#2e7d32">(manifold flattens at horizon)</text>

    <!-- Annotation: debate -->
    <rect x="150" y="225" width="250" height="30" fill="#fff3e0" stroke="#ffb74d" stroke-width="0.8" rx="4"/>
    <text x="275" y="240" text-anchor="middle" class="small" fill="#e65100" font-weight="600">The Stern–Nordhaus debate = disagreement about</text>
    <text x="275" y="252" text-anchor="middle" class="small" fill="#e65100" font-weight="600">the curvature tensor along the temporal axis</text>
  </g>

  <!-- Caption -->
  <text x="340" y="370" text-anchor="middle" class="subtitle">Exponential (constant curvature) vs. hyperbolic (decreasing curvature) vs. Stern (flat). The discount rate is not a preference — it is temporal curvature.</text>
  <text x="340" y="386" text-anchor="middle" class="subtitle">Proposition 15.1: Near the present, more dimensions activate (visceral goods), producing steep curvature. At long horizons, only d₁ persists → flatter.</text>
</svg>
